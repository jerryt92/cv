<script>
    var fileReader = new FileReader();
    var key = '';
    var qkey = getPramValue('qkey');
    window.onload = function () {
        if (sessionStorage.getItem('pwd')) {
            document.getElementById('key').value = sessionStorage.getItem('pwd');
            verify();
        }
        if (qkey != null) {
            try {
                // 把qkey解密为key
                key = aesDecryptBase64(''+CryptoJS.MD5("20221001"), qkey);
                // 解锁头像
                // imgDecryptToCSS(window.location.origin + '/assets/img/tjl_image_672_672.webp.wa.aes256.bin', key, 'image-hero');
                // GitHub
                imgDecryptToCSS(window.location.pathname + 'assets/img/tjl_image_672_672.webp.wa.aes256.bin', key, 'image-hero');
                // 解锁head-text
                document.getElementById('head-text').innerHTML = aesDecryptBase64(''+CryptoJS.MD5(key), headText);
                // 解锁main-text
                document.getElementById('main-text').innerHTML = aesDecryptBase64(''+CryptoJS.MD5(key), mainText);
                document.getElementById('verify-div').setAttribute('hidden', 'hidden');
            } catch (e) {
                alert('qkey参数错误！');
            }
        }
    }

    function verify() {
        key = document.getElementById('key').value;
        try {
            // 解锁头像
            // imgDecryptToCSS(window.location.origin + '/assets/img/tjl_image_672_672.webp.wa.aes256.bin', key, 'image-hero');
            // GitHub
            imgDecryptToCSS(window.location.pathname + 'assets/img/tjl_image_672_672.webp.wa.aes256.bin', key, 'image-hero');
            // 解锁head-text
            document.getElementById('head-text').innerHTML = aesDecryptBase64(''+CryptoJS.MD5(key), headText);
            // 解锁main-text
            document.getElementById('main-text').innerHTML = aesDecryptBase64(''+CryptoJS.MD5(key), mainText);
            document.getElementById('verify-div').setAttribute('hidden', 'hidden');
            sessionStorage.setItem('pwd',key);
        } catch (e) {
            alert('密码错误！');
            sessionStorage.clear();
            location.reload();
        }
    }

    //加密图片解密
    function imgDecryptToSrc(img_url, key, img_id) {
        console.log("img_url = " + img_url);

        let xhr = new XMLHttpRequest();
        xhr.open("get", img_url, true);
        xhr.responseType = "blob";
        xhr.onload = function () {
            if (this.status == 200) {
                var blob = this.response;
                fileReader.readAsArrayBuffer(blob)
                fileReader.onload = function (e) {
                    const decData = aesFileDecrypt(''+CryptoJS.MD5(key), e.target.result);
                    const fileBlob = new Blob([decData], {type: "application/octet-stream"});
                    document.getElementById(img_id).setAttribute('src', URL.createObjectURL(fileBlob));
                };
            }
        };
        xhr.send();
    }

    function imgDecryptToCSS(img_url, key, img_id) {
        console.log("img_url = " + img_url);
        let xhr = new XMLHttpRequest();
        xhr.open("get", img_url, true);
        xhr.responseType = "blob";
        xhr.onload = function () {
            if (this.status == 200) {
                var blob = this.response;
                fileReader.readAsArrayBuffer(blob)
                fileReader.onload = function (e) {
                    const decData = aesFileDecrypt(''+CryptoJS.MD5(key), e.target.result);
                    const fileBlob = new Blob([decData], {type: "application/octet-stream"});
                    var csstext = 'background-image: url(' + URL.createObjectURL(fileBlob) + ');'
                    document.getElementById(img_id).style.cssText += csstext;
                };
            }
        };
        xhr.send();
    }

    function getPramValue(pramName) {
        var query = decodeURI(window.location.search.substring(1));
        var vars = query.split("&");
        for (var i = 0; i < vars.length; i++) {
            var pair = vars[i].split("=");
            if (pair[0] == pramName) {
                return pair[1].trim();
            }
        }
        return null;
    }
</script>
